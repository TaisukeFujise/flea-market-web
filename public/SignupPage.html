<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
    ::placeholder{color:#9b9aa8}
  </style>
</helmet>

<div style="display:flex;min-height:100vh;width:100%;background:#fff;color:#0b1326;font-family:'Plus Jakarta Sans',sans-serif">

  <!-- LEFT PANEL -->
  <section data-screen-label="Signup hero" style="position:relative;flex:1.78;overflow:hidden;background:radial-gradient(120% 120% at 60% 38%, #fcfcfe 0%, #f4f3fb 46%, #e9e7f6 100%);padding:48px 60px 0 92px;display:flex;flex-direction:column">

    <header style="display:flex;align-items:center">
      <img src="uploads/brand-concept-logo.png" alt="Lqupe" style="height:{{ logoH }}px;width:auto;display:block">
    </header>

    <div style="margin-top:{{ headingMt }};max-width:560px;position:relative;z-index:2">
      <h1 style="font-size:66px;line-height:1.0;font-weight:800;letter-spacing:-0.025em;color:#0b1326">Trade with<br>confidence.</h1>
      <p style="margin-top:26px;font-size:21px;line-height:1.5;font-weight:500;color:#54526a;max-width:470px">AI-powered damage detection helps you understand the true condition of every item.</p>
    </div>

    <!-- product composite as a transparent-background PNG; sits over the CSS gradient, no seam, no overlap hacks -->
    <img src="uploads/bag-cutout.png" alt="Condition analysis preview" style="position:absolute;left:1.5%;bottom:-3.2%;width:97%;height:auto;display:block;pointer-events:none;user-select:none">
  </section>

  <!-- RIGHT PANEL -->
  <section data-screen-label="Signup form" style="flex:1;min-width:430px;display:flex;flex-direction:column;padding:34px 4.6% 40px">

    <div style="display:flex;align-items:center;justify-content:flex-end;gap:14px">
      <span style="font-size:14.5px;color:#6c6a7d">Already have an account?</span>
      <a href="#" style="font-size:14.5px;font-weight:600;color:#0b1326;text-decoration:none;border:1px solid #e4e3ec;border-radius:10px;padding:8px 16px;transition:background .15s" style-hover="background:#f6f5fa">Log in</a>
    </div>

    <div style="flex:1;display:flex;flex-direction:column;justify-content:center;max-width:404px;width:100%;margin:0 auto;padding:14px 0 28px">

      <h2 style="font-size:30px;font-weight:700;letter-spacing:-0.02em;color:#0b1326">Create your account</h2>
      <p style="margin-top:10px;font-size:15.5px;color:#6c6a7d">Join Lqupe and start trading with confidence.</p>

      <!-- OAuth -->
      <div style="display:flex;flex-direction:column;gap:12px;margin-top:30px">
        <button type="button" style="display:flex;align-items:center;justify-content:center;gap:11px;height:52px;border:1px solid #e4e3ec;border-radius:12px;background:#fff;font-family:inherit;font-size:15.5px;font-weight:600;color:#0b1326;cursor:pointer;transition:background .15s" style-hover="background:#f8f7fb">
          <svg width="19" height="19" viewBox="0 0 48 48"><path fill="#4285F4" d="M45.12 24.5c0-1.56-.14-3.06-.4-4.5H24v8.51h11.84c-.51 2.75-2.06 5.08-4.39 6.64v5.52h7.11c4.16-3.83 6.56-9.47 6.56-16.17z"></path><path fill="#34A853" d="M24 46c5.94 0 10.92-1.97 14.56-5.33l-7.11-5.52c-1.97 1.32-4.49 2.1-7.45 2.1-5.73 0-10.58-3.87-12.31-9.07H4.34v5.7C7.96 41.07 15.4 46 24 46z"></path><path fill="#FBBC05" d="M11.69 28.18C11.25 26.86 11 25.45 11 24s.25-2.86.69-4.18v-5.7H4.34A21.99 21.99 0 0 0 2 24c0 3.55.85 6.91 2.34 9.88l7.35-5.7z"></path><path fill="#EA4335" d="M24 9.75c3.23 0 6.13 1.11 8.41 3.29l6.31-6.31C34.91 2.97 29.93 1 24 1 15.4 1 7.96 5.93 4.34 13.12l7.35 5.7c1.73-5.2 6.58-9.07 12.31-9.07z"></path></svg>
          Continue with Google
        </button>
      </div>

      <!-- divider -->
      <div style="display:flex;align-items:center;gap:14px;margin:24px 0">
        <span style="flex:1;height:1px;background:#e8e7ee"></span>
        <span style="font-size:13px;color:#9b9aa8">or</span>
        <span style="flex:1;height:1px;background:#e8e7ee"></span>
      </div>

      <!-- fields -->
      <form style="display:flex;flex-direction:column;gap:18px" onSubmit="{{ onSubmit }}">
        <div style="display:flex;flex-direction:column;gap:8px">
          <label style="font-size:13.5px;font-weight:600;color:#3a3850">Email</label>
          <input type="email" placeholder="you@example.com" style="height:52px;border:1px solid #e4e3ec;border-radius:12px;padding:0 16px;font-family:inherit;font-size:15px;color:#0b1326;background:#fff;outline:none;transition:border .15s,box-shadow .15s" style-focus="border:1px solid #6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.12)">
        </div>

        <div style="display:flex;flex-direction:column;gap:8px">
          <label style="font-size:13.5px;font-weight:600;color:#3a3850">Password</label>
          <div style="position:relative;display:flex">
            <input type="{{ pwType }}" placeholder="Create a password" style="flex:1;height:52px;border:1px solid #e4e3ec;border-radius:12px;padding:0 48px 0 16px;font-family:inherit;font-size:15px;color:#0b1326;background:#fff;outline:none;transition:border .15s,box-shadow .15s" style-focus="border:1px solid #6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.12)">
            <button type="button" aria-label="Toggle password" onClick="{{ togglePw }}" style="position:absolute;right:6px;top:50%;transform:translateY(-50%);width:38px;height:38px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;cursor:pointer;color:#9b9aa8">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
        </div>

        <div style="display:flex;flex-direction:column;gap:8px">
          <label style="font-size:13.5px;font-weight:600;color:#3a3850">Username</label>
          <input type="text" placeholder="Choose a username" style="height:52px;border:1px solid #e4e3ec;border-radius:12px;padding:0 16px;font-family:inherit;font-size:15px;color:#0b1326;background:#fff;outline:none;transition:border .15s,box-shadow .15s" style-focus="border:1px solid #6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.12)">
        </div>

        <button type="submit" style="margin-top:6px;height:54px;border:none;border-radius:12px;background:#0b1326;color:#fff;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;transition:background .15s" style-hover="background:#1a2540">Sign up</button>
      </form>

      <p style="margin-top:22px;font-size:13px;line-height:1.55;color:#8a899a">By signing up, you agree to our <a href="#" style="color:#6366f1;font-weight:600;text-decoration:none">Terms of Service</a> and <a href="#" style="color:#6366f1;font-weight:600;text-decoration:none">Privacy Policy</a>.</p>
    </div>
  </section>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:900},&quot;logoSize&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:53,&quot;min&quot;:24,&quot;max&quot;:80,&quot;tsType&quot;:&quot;number&quot;},&quot;headingPos&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:5,&quot;min&quot;:0,&quot;max&quot;:30,&quot;tsType&quot;:&quot;number&quot;}}">
class Component extends DCLogic {
  state = { showPw: false };
  renderVals() {
    return {
      pwType: this.state.showPw ? 'text' : 'password',
      togglePw: () => this.setState(s => ({ showPw: !s.showPw })),
      onSubmit: (e) => { e.preventDefault(); },
      logoH: this.props.logoSize ?? 44,
      headingMt: (this.props.headingPos ?? 13) + 'vh'
    };
  }
}
</script>
</body>
</html>
